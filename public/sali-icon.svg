<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
    </style>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Koko kokonaisuus nostettu 20px ylemmäs (translate y=-20) -->
  <g transform="translate(0, -20)">

    <!-- Kaareva tanko, paksuus 18 -->
    <path d="M 148 252 Q 256 204 364 252"
          stroke="white" stroke-width="18" fill="none" stroke-linecap="round"/>

    <!-- VASEN — iso levy -->
    <rect x="116" y="193" width="36" height="124" rx="10" fill="white"
          transform="rotate(-18, 134, 252)"/>

    <!-- VASEN — pieni levy, y+19, x+7 -->
    <rect x="87" y="222" width="26" height="96" rx="8" fill="white"
          transform="rotate(-18, 100, 270)"/>

    <!-- OIKEA — iso levy -->
    <rect x="360" y="193" width="36" height="124" rx="10" fill="white"
          transform="rotate(18, 378, 252)"/>

    <!-- OIKEA — pieni levy, y+19, x-7 -->
    <rect x="399" y="222" width="26" height="96" rx="8" fill="white"
          transform="rotate(18, 412, 270)"/>

  </g>

  <!-- SALI teksti — ei nosteta -->
  <text x="256" y="415"
        font-family="'Bebas Neue', Impact, sans-serif"
        font-size="100"
        font-weight="400"
        fill="white"
        text-anchor="middle"
        letter-spacing="20">SALI</text>
</svg>
